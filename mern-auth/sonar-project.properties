# =============================================================================
# SonarQube / SonarCloud — Project Configuration
#
# Dynamic values (projectKey, organization, host.url) are injected at runtime
# by the sonar-scanner CLI flags in the Jenkinsfile.  Everything that is
# static and environment-independent lives here so it is version-controlled
# and consistent across every branch scan.
# =============================================================================

# ── Source & Test file separation ────────────────────────────────────────────
# sonar.sources must contain ONLY production code.
# Test files listed under sonar.sources get treated as source code, which
# causes SonarQube to report 0 % coverage on them (no other test covers a
# test file), inflating the "uncovered" line count and failing quality gates.
sonar.sources=api/controllers,api/models,api/routes,api/utils,api/index.js,client/src

# Declare all test files explicitly so SonarQube tracks them as tests,
# not as source.  These paths are relative to the project base directory
# (the mern-auth/ folder where sonar-scanner is invoked).
sonar.test.inclusions=\
  api/tests/**/*.js,\
  client/src/__tests__/**/*.jsx,\
  client/src/__tests__/**/*.js

# ── Coverage report paths ────────────────────────────────────────────────────
# Both the frontend (client/) and backend (root coverage/) lcov reports must
# be listed so SonarQube merges them into a single project-level metric.
sonar.javascript.lcov.reportPaths=\
  client/coverage/lcov.info,\
  coverage/lcov.info

# ── Exclusions ───────────────────────────────────────────────────────────────
# Files that should not appear in analysis at all (no issues, no coverage).
sonar.exclusions=\
  **/node_modules/**,\
  client/dist/**,\
  **/coverage/**

# Files excluded from coverage measurement only (they still get issue analysis).
# Test helpers and setup files never contribute to coverage numbers.
sonar.coverage.exclusions=\
  api/tests/**,\
  client/src/__tests__/**,\
  client/src/main.jsx

# Suppress duplicate-code detection on test files (assertions are repetitive
# by nature and flagging them as duplicates adds noise without value).
sonar.cpd.exclusions=\
  api/tests/**,\
  client/src/__tests__/**
